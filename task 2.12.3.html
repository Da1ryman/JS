<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <script>
    let num1 = Number(prompt("Num1", "10"));
    let num2 = Number(prompt("Num2", "20"));
    let result = undefined;

    result ??= num1 ??= num2;

    alert(result);
  </script>
  <body></body>
</html>
