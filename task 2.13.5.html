<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let i = +prompt("Введите число", "");

      stop: while (i < 100) {
        let i = +prompt("Введите число", "");

        if (i > 100) {
          break stop;
        } else if (!i) {
          alert("Ну ты конечно круассан, давай пиши нормально");
        }
      }

      alert("Ура победа");
    </script>
  </head>
  <body></body>
</html>

<!-- Напишите цикл, который предлагает prompt ввести число, большее 100. Если
посетитель ввёл другое число – попросить ввести ещё раз, и так далее. Цикл
должен спрашивать число пока либо посетитель не введёт число, большее 100, либо
не нажмёт кнопку Отмена (ESC). Предполагается, что посетитель вводит только
числа. Предусматривать обработку нечисловых строк в этой задаче необязательно. -->
