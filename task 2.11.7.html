<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let age = prompt("Введите возраст", "");
      if (age >= 14 && age <= 90) {
        alert(true);
      } else {
        alert(false);
      }
    </script>
  </head>
  <body></body>
</html>

<!-- Проверка значения из диапазона важность: 3 Напишите условие if для проверки, что
переменная age находится в диапазоне между 14 и 90 включительно. «Включительно»
означает, что значение переменной age может быть равно 14 или 90. -->
