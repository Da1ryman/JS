<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let number = +prompt("Введите число членов в жопе", "");

      switch (number) {
        case 0:
        case 1:
          alert("Мало, исправить немедленно");
          break;
        case 2:
          alert("Ну норм");
          break;
        default:
          alert("Герой!!!!");
      }
    </script>
  </head>
  <body></body>
</html>
