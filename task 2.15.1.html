<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function getAnswer(funct) {
        if (funct()) {
          alert("Доступ получен");
        } else {
          alert("Доступ запрещен");
        }
      }

      function checkAgeOr() {
        let age = +prompt("Введите ваш возраст", "");

        return age >= 18 || confirm("А родители разрешили");
      }

      function checkAge() {
        let age =
          prompt("Введите ваш возраст", "") >= 18
            ? true
            : confirm("А родители разрешили");

        return age;
      }

      getAnswer(checkAge);
      getAnswer(checkAgeOr);
    </script>
  </head>
  <body></body>
</html>
