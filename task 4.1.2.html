    <script>
      function isEmpty(obj) {
        for (let key in obj) {
          // если тело цикла начнет выполняться - значит в объекте есть свойства
          return false;
        }
        return true;
      }

      const bara = {
        name: "gere",
      };

      const bere = {};

      alert(isEmpty(bara));

      alert(isEmpty(bere));
    </script>
