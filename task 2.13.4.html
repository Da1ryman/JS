<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let i = 0;

      while (i < 3) {
        alert(`number ${i}!`);

        i++;
      }

      for (let i = 0; i < 3; i++) {
        alert(`number ${i}!`);
      }
    </script>
  </head>
  <body></body>
</html>
