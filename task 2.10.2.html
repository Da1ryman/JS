<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <script>
    let num = prompt("Введите число", "");

    if (num > 0) {
      alert(1);
    } else if (num == 0) {
      alert(0);
    } else {
      alert(-1);
    }
  </script>
  <body></body>
</html>

<!-- Используя конструкцию if..else, напишите код, который получает число через
prompt, а затем выводит в alert: 1, если значение больше нуля, -1, если значение
меньше нуля, 0, если значение равно нулю. Предполагается, что пользователь
вводит только числа. -->
