<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let username = prompt("Введите логин", "");

      if (username == "") {
        alert("Отмена");
      } else if (username == "Админ") {
        let password = prompt("Дай пароль гад", "");

        if (password == "Я главный") {
          alert("Салам биг босс");
        } else if (password == "") {
          alert("Отмена");
        } else {
          alert("Съебался нахуй пиздабол");
        }
      } else {
        alert("Пиздуй нахуй!!!");
      }
    </script>
  </head>
  <body></body>
</html>

<!-- Пароль проверять так: Если введён пароль «Я главный», то выводить
«Здравствуйте!», Иначе – «Неверный пароль», При отмене или в случае если ничего
не введено – «Отменено». Блок-схема: Для решения используйте вложенные блоки if.
Обращайте внимание на стиль и читаемость кода. Подсказка: передача пустого ввода
в приглашение prompt возвращает пустую строку ''. Нажатие клавиши Esc во время
запроса возвращает null. -->
