<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let first = +prompt("Базовый минимум", "");
      let second = +prompt("Роскошный максимум", "");

      function a(min, max) {
        let num = min + Math.random() * (max + 1 - min);

        return Math.floor(num);
      }

      alert(a(first, second));
    </script>
  </body>
</html>

<!-- Напишите функцию randomInteger(min, max), 

которая генерирует случайное целое (integer) число от min до max (включительно).

Любое число из интервала min..max должно появляться с одинаковой вероятностью.

Пример работы функции:

alert( randomInteger(1, 5) ); // 1
alert( randomInteger(1, 5) ); // 3
alert( randomInteger(1, 5) ); // 5 -->
