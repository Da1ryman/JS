<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      let age = prompt("", "");
      if (age < 14 && age != 14 && age <= 90 && age != 90) {
        alert(true);
      } else {
        alert(false);
      }
    </script>
    <script>
      let ageNew = prompt("", "");
      if (ageNew < 14 || ageNew > 90) {
        alert(true);
      } else {
        alert(false);
      }
    </script>
  </head>
  <body></body>
</html>
