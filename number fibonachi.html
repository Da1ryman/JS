<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      fibonachi: for (let i = 0; i < 100; i++) {
        let formula = (1.618 ** i - (-1.618) ** -i) / (1.618 - (-1.618) ** -1);

        if (i === 0) {
          alert(0);

          continue fibonachi;
        } else if (i === 1) {
          alert(1);
        } else {
          alert(Math.round(formula));
        }
      }
    </script>
  </head>
  <body></body>
</html>
