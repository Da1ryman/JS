<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function min() {
        let a = +prompt("Введите а", "");
        let b = +prompt("Введите b", "");

        if (a > b) {
          return b;
        } else {
          return a;
        }
      }

      alert(min());
    </script>
  </head>
  <body></body>
</html>

<!-- Функция min(a, b)
важность: 1
Напишите функцию min(a,b), которая возвращает меньшее из чисел a и b.

Пример вызовов:

min(2, 5) == 2
min(3, -1) == -1
min(1, 1) == 1 -->
