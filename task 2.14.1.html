<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      let browser = prompt("Введите с чего сидите", "");

      if (browser === "Edge") {
        alert("Пиздец...");
      } else if (browser === "") {
        alert("Ебать ты с чего сидишь олух");
      } else {
        alert("Лан пойдет");
      }
    </script>
  </head>
  <body></body>
</html>
